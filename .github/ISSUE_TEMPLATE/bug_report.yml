name: Bug 报告
description: 提交一个 Bug 报告，帮助我们改进 DeerTitle
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间提交 Bug 报告！请尽量填写以下信息，以便我们更快地定位和修复问题。

  - type: input
    id: plugin-version
    attributes:
      label: DeerTitle 版本
      description: 你正在使用的 DeerTitle 版本号（可在 `/dt` 命令或 `plugin.yml` 中查看）
      placeholder: "例如: 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: server-platform
    attributes:
      label: 服务端平台
      description: 你使用的服务端类型
      options:
        - Paper
        - Folia
        - Spigot
        - Purpur
        - 其他
    validations:
      required: true

  - type: input
    id: server-version
    attributes:
      label: 服务端版本
      description: 你的 Minecraft 服务端版本号
      placeholder: "例如: 1.20.1"
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java 版本
      description: 服务端运行的 Java 版本
      placeholder: "例如: Java 17"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰地描述你遇到的问题
      placeholder: "描述你期望的行为和实际发生的行为"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 提供可以复现该问题的详细步骤
      placeholder: |
        1. 执行命令 '...'
        2. 点击 '...'
        3. 看到错误 '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望会发生什么？
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 请粘贴相关的错误日志或控制台输出（请使用代码块格式）
      render: text
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: 相关配置
      description: 如果与配置相关，请粘贴你的 `config.yml` 或相关配置片段
      render: yaml
    validations:
      required: false

  - type: textarea
    id: plugins
    attributes:
      label: 已安装插件列表
      description: 请列出服务器上安装的其他插件（可执行 `/plugins` 获取）
      placeholder: |
        - PlaceholderAPI 2.11.6
        - Vault 1.7.3
        - ...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何其他你认为有助于排查问题的信息（截图、视频等）
    validations:
      required: false
