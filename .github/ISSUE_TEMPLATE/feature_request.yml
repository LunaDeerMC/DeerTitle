name: 功能建议
description: 提出一个新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请描述你希望 DeerTitle 增加的功能或改进。

  - type: dropdown
    id: category
    attributes:
      label: 功能类别
      description: 这个建议属于哪个方面？
      options:
        - 称号系统（持有、佩戴、过期等）
        - 称号商店
        - 称号卡
        - GUI 菜单
        - PlaceholderAPI 占位符
        - 经济系统（Vault / 内置货币）
        - 数据库
        - 配置与语言
        - 命令
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清晰地描述你希望添加的功能
      placeholder: "我希望 DeerTitle 能够..."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 描述这个功能的使用场景，为什么需要它？
      placeholder: "作为一个服主/玩家，我希望..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他实现方式或替代方案？
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何其他有助于理解这个建议的信息（截图、参考链接等）
    validations:
      required: false
